<!DOCTYPE html>
<html lang="pt-BR">
<script src="static/js/auth.js"></script>
<script src="static/js/mapa.js"></script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Social</title>

  <!-- Leaflet.js — biblioteca do mapa -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase — autenticação e banco -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --text: #1a1a18;
      --text2: #6b6a65;
      --border: rgba(0,0,0,0.10);
      --radius: 10px;
      --blue: #185FA5;
      --blue-bg: #E6F1FB;
      --green: #0F6E56;
      --green-bg: #E1F5EE;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #242422;
        --text: #e8e6de;
        --text2: #9c9a92;
        --border: rgba(255,255,255,0.08);
        --blue: #85B7EB;
        --blue-bg: #042C53;
        --green: #5DCAA5;
        --green-bg: #04342C;
      }
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TELA DE LOGIN ─────────────────────────────── */
    #tela-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
    }

    .login-titulo {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text);
    }

    .login-sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 24px;
    }

    .campo-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      display: block;
      margin-bottom: 5px;
    }

    .campo-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 14px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    .campo-input:focus { border-color: var(--blue); }

    .btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      cursor: pointer;
      transition: opacity .15s;
      font-family: inherit;
    }

    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--blue-bg);
      color: var(--blue);
      border-color: var(--blue);
    }

    .btn-google {
      background: var(--bg);
      color: var(--text);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .divisor {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
    }

    .divisor-linha {
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    .divisor-texto {
      font-size: 12px;
      color: var(--text2);
    }

    .trocar-modo {
      text-align: center;
      font-size: 12px;
      color: var(--text2);
      margin-top: 16px;
    }

    .trocar-modo a {
      color: var(--blue);
      cursor: pointer;
      text-decoration: none;
    }

    .mensagem {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      display: none;
    }

    .mensagem.erro {
      background: #faece7;
      color: #712b13;
      display: block;
    }

    .mensagem.sucesso {
      background: var(--green-bg);
      color: var(--green);
      display: block;
    }

    /* ── TELA DO MAPA ──────────────────────────────── */
    #tela-mapa {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    #tela-mapa.ativa {
      display: flex;
    }

    .topbar {
      height: 48px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 1000;
    }

    .topbar-nome {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .topbar-acoes {
      display: flex;
      gap: 8px;
    }

    .btn-topo {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .btn-topo:hover { background: var(--bg2); }

    #mapa-container {
      flex: 1;
      position: relative;
    }

    #mapa {
      width: 100%;
      height: 100%;
    }

    /* ── LOADING ───────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text2);
      z-index: 9999;
    }
  </style>
</head>
<body>

<!-- Loading inicial -->
<div id="loading">Carregando...</div>

<!-- ── TELA DE LOGIN ────────────────────────────────── -->
<div id="tela-login" style="display:none">
  <div class="login-card">
    <div class="login-titulo">Mapa Social</div>
    <div class="login-sub" id="login-sub">Entre para explorar o mapa</div>

    <div class="mensagem" id="mensagem"></div>

    <div id="form-login">
      <label class="campo-label">Email</label>
      <input class="campo-input" type="email" id="email" placeholder="seu@email.com">

      <label class="campo-label">Senha</label>
      <input class="campo-input" type="password" id="senha" placeholder="••••••••">

      <button class="btn btn-primary" onclick="login()">Entrar</button>

      <div class="divisor">
        <div class="divisor-linha"></div>
        <span class="divisor-texto">ou</span>
        <div class="divisor-linha"></div>
      </div>

      <button class="btn btn-google" onclick="loginGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Entrar com Google
      </button>

      <div class="trocar-modo">
        Não tem conta? <a onclick="mostrarCadastro()">Criar conta</a>
      </div>
    </div>

    <div id="form-cadastro" style="display:none">
      <label class="campo-label">Email</label>
      <input class="campo-input" type="email" id="email-cad" placeholder="seu@email.com">

      <label class="campo-label">Senha</label>
      <input class="campo-input" type="password" id="senha-cad" placeholder="mínimo 6 caracteres">

      <button class="btn btn-primary" onclick="cadastrar()">Criar conta</button>

      <div class="trocar-modo" style="margin-top:12px">
        Já tem conta? <a onclick="mostrarLogin()">Entrar</a>
      </div>
    </div>
  </div>
</div>

<!-- ── TELA DO MAPA ─────────────────────────────────── -->
<div id="tela-mapa">
  <div class="topbar">
    <span class="topbar-nome" id="nome-usuario">Mapa Social</span>
    <div class="topbar-acoes">
      <button class="btn-topo" onclick="abrirPerfil()">Perfil</button>
      <button class="btn-topo" onclick="sair()">Sair</button>
    </div>
  </div>
  <div id="mapa-container">
    <div id="mapa"></div>
  </div>
</div>

<script>
  // ── CONFIGURAÇÃO SUPABASE ───────────────────────────
  // Troque pelos seus valores do painel do Supabase
  const SUPABASE_URL = 'https://fkjllotmvxsrawzavchd.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZramxsb3RtdnhzcmF3emF2Y2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTA4NTEsImV4cCI6MjA5MjAyNjg1MX0.eyo_tM8MqIT07CiGLGPuIXcDdrfbcTw-dEM6ZyFWhh0'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  // ── URL DO SERVIDOR FLASK ───────────────────────────
  // Enquanto desenvolve localmente use localhost
  // Depois de fazer deploy no Railway, troque pelo URL real
  const SERVIDOR = 'http://localhost:5000'

  // ── INICIALIZAÇÃO ───────────────────────────────────
  window.addEventListener('load', async () => {
    const { data: { session } } = await db.auth.getSession()

    if (session) {
      mostrarMapa(session.user)
    } else {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('tela-login').style.display = 'flex'
    }
  })

  // ── FUNÇÕES DE LOGIN ────────────────────────────────


  // ── MAPA ────────────────────────────────────────────
  
  function mostrarMapa(user) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('tela-login').style.display = 'none'
    document.getElementById('tela-mapa').classList.add('ativa')
    document.getElementById('nome-usuario').textContent = user.email.split('@')[0]

    iniciarMapa(user)
  }

  // ── HELPERS ─────────────────────────────────────────

  function iniciarChat(nome) {
    alert('Chat com ' + nome + ' — próxima etapa!')
  }
</script>
</body>
</html>
